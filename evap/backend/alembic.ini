# ==============================================================================
# Alembic Configuration for EVAP Backend
# ==============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template for generating new revision filenames
# file_template = %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path modification — uncomment if needed
# prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Truncate length of slug in filename
truncate_slug_length = 40

# Revision environment
revision_environment = false

# True if you want the autogenerate feature of alembic
sourceless = false

# version locations — multiple paths possible (space-separated)
version_locations = %(here)s/alembic/versions

# Loggers
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
