apiVersion: 1

providers:
  - name: EVAP Dashboards
    orgId: 1
    folder: EVAP
    folderUid: evap-dashboards
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
