groups:
  # ============================================================================
  # Camera / Stream Alerts
  # ============================================================================
  - name: camera_alerts
    interval: 30s
    rules:
      - alert: CameraOffline
        expr: |
          (time() - evap_camera_last_frame_timestamp_seconds) > 300
        for: 5m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Camera {{ $labels.camera_id }} ({{ $labels.location }}) is offline"
          description: "Camera {{ $labels.camera_id }} at {{ $labels.location }} has not sent a frame for more than 5 minutes. Last seen: {{ $value | humanizeDuration }} ago."
          runbook: "https://wiki.internal/runbooks/camera-offline"

      - alert: CameraHighLatency
        expr: |
          evap_camera_frame_latency_seconds{quantile="0.95"} > 2
        for: 2m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Camera {{ $labels.camera_id }} stream latency is high"
          description: "P95 frame latency for camera {{ $labels.camera_id }} is {{ $value }}s (threshold: 2s)."

  # ============================================================================
  # Host / Node Alerts
  # ============================================================================
  - name: node_alerts
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU utilization on {{ $labels.instance }} is {{ printf \"%.1f\" $value }}% (threshold: 85%)."

      - alert: HighGPUUsage
        expr: |
          evap_gpu_utilization_percent > 90
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High GPU usage on {{ $labels.instance }}"
          description: "GPU {{ $labels.gpu_index }} on {{ $labels.instance }} is at {{ printf \"%.1f\" $value }}% utilization."

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory utilization is {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ printf \"%.1f\" $value }}% disk space remaining on {{ $labels.instance }}:{{ $labels.mountpoint }}."

  # ============================================================================
  # PostgreSQL Alerts
  # ============================================================================
  - name: postgres_alerts
    rules:
      - alert: PostgreSQLHighConnections
        expr: |
          pg_stat_database_numbackends{datname="evap"} > 80
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL connection count is high"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80). Max is pg_settings_max_connections."

      - alert: PostgreSQLDown
        expr: |
          pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding to scrape."

      - alert: PostgreSQLSlowQueries
        expr: |
          rate(pg_stat_activity_max_tx_duration{datname="evap"}[5m]) > 30
        for: 2m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL has long-running transactions"
          description: "Longest transaction age is {{ $value }}s on {{ $labels.instance }}."

      - alert: PostgreSQLReplicationLag
        expr: |
          pg_replication_lag > 60
        for: 2m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL replication lag is high"
          description: "Replication lag is {{ $value }}s on {{ $labels.instance }}."

  # ============================================================================
  # Redis Alerts
  # ============================================================================
  - name: redis_alerts
    rules:
      - alert: RedisHighMemoryUsage
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis on {{ $labels.instance }} is using {{ printf \"%.1f\" $value }}% of max memory."

      - alert: RedisDown
        expr: |
          redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is not responding."

      - alert: RedisHighKeyEviction
        expr: |
          rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Redis is evicting keys at a high rate"
          description: "Redis on {{ $labels.instance }} is evicting {{ $value }} keys/s. Consider increasing maxmemory."

  # ============================================================================
  # RabbitMQ Alerts
  # ============================================================================
  - name: rabbitmq_alerts
    rules:
      - alert: RabbitMQHighQueueDepth
        expr: |
          rabbitmq_queue_messages{vhost="/"} > 1000
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} depth is high"
          description: "Queue {{ $labels.queue }} on {{ $labels.instance }} has {{ $value }} messages (threshold: 1000). Workers may be falling behind."

      - alert: RabbitMQDown
        expr: |
          rabbitmq_up == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "RabbitMQ is down"
          description: "RabbitMQ instance {{ $labels.instance }} is not responding."

      - alert: RabbitMQUnackedMessages
        expr: |
          rabbitmq_queue_messages_unacked{vhost="/"} > 500
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "RabbitMQ has many unacknowledged messages"
          description: "Queue {{ $labels.queue }} has {{ $value }} unacked messages."

  # ============================================================================
  # API / Application Alerts
  # ============================================================================
  - name: api_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) * 100 > 5
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "EVAP API error rate is above 5%"
          description: "HTTP 5xx error rate is {{ printf \"%.2f\" $value }}% over the last 5 minutes (threshold: 5%)."

      - alert: HighResponseTimeP95
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API P95 response time exceeds 2 seconds"
          description: "The 95th percentile response time is {{ printf \"%.2f\" $value }}s (threshold: 2s)."

      - alert: BackendDown
        expr: |
          up{job="evap-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "EVAP backend is down"
          description: "The EVAP backend scrape target {{ $labels.instance }} is unreachable."

      - alert: CeleryWorkerDown
        expr: |
          evap_celery_workers_online < 1
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "No Celery workers are online"
          description: "All Celery workers appear to be offline. Background tasks will not process."
