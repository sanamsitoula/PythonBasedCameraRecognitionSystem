apiVersion: apps/v1
kind: Deployment
metadata:
  name: evap-backend
  namespace: evap
  labels:
    app: evap
    component: backend
    version: "4.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evap
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: evap
        component: backend
        version: "4.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: evap-backend-sa
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: evap
                    component: backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: evap-registry/evap-backend:4.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: evap-config
            - secretRef:
                name: evap-secrets
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: snapshots-pvc
      imagePullSecrets:
        - name: evap-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: evap
  labels:
    app: evap
    component: backend
spec:
  type: ClusterIP
  selector:
    app: evap
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: evap-backend-sa
  namespace: evap
  labels:
    app: evap
    component: backend
