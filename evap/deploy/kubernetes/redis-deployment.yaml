apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: evap
  labels:
    app: evap
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evap
      component: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: evap
        component: redis
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --appendonly yes
            - --appendfsync everysec
            - --maxmemory 512mb
            - --maxmemory-policy allkeys-lru
            - --requirepass $(REDIS_PASSWORD)
            - --save 900 1
            - --save 300 10
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evap-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: evap
  labels:
    app: evap
    component: redis
spec:
  type: ClusterIP
  selector:
    app: evap
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
