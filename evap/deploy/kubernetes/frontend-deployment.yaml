apiVersion: apps/v1
kind: Deployment
metadata:
  name: evap-frontend
  namespace: evap
  labels:
    app: evap
    component: frontend
    version: "4.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evap
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: evap
        component: frontend
        version: "4.0.0"
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        runAsNonRoot: true
      containers:
        - name: frontend
          image: evap-registry/evap-frontend:4.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: REACT_APP_API_URL
              value: "https://evap.yourdomain.com/api"
            - name: REACT_APP_WS_URL
              value: "wss://evap.yourdomain.com/ws"
          resources:
            requests:
              cpu: "200m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: evap-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: evap
  labels:
    app: evap
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: evap
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 80
      protocol: TCP
