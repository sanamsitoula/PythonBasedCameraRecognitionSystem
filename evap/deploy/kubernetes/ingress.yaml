apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evap-ingress
  namespace: evap
  labels:
    app: evap
    component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"

    # TLS via cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # Body size for snapshot uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://evap.yourdomain.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
spec:
  tls:
    - hosts:
        - evap.yourdomain.com
      secretName: evap-tls-cert
  rules:
    - host: evap.yourdomain.com
      http:
        paths:
          # API routes → backend
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # WebSocket routes → backend (with upgrade headers)
          - path: /ws(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Swagger / OpenAPI docs → backend
          - path: /(docs|redoc|openapi\.json)
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Metrics (restrict with NetworkPolicy separately)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
---
# WebSocket-specific Ingress to override timeout annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evap-ingress-ws
  namespace: evap
  labels:
    app: evap
    component: ingress-ws
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - evap.yourdomain.com
      secretName: evap-tls-cert
  rules:
    - host: evap.yourdomain.com
      http:
        paths:
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
