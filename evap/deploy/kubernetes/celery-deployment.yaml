apiVersion: apps/v1
kind: Deployment
metadata:
  name: evap-celery-worker
  namespace: evap
  labels:
    app: evap
    component: celery-worker
    version: "4.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evap
      component: celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: evap
        component: celery-worker
        version: "4.0.0"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
      containers:
        - name: celery-worker
          image: evap-registry/evap-backend:4.0.0
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - -c
            - "4"
            - -Q
            - default,reports,notifications
            - --hostname=worker@%(h)s
          envFrom:
            - configMapRef:
                name: evap-config
            - secretRef:
                name: evap-secrets
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A app.workers.celery_app inspect ping -d celery@$HOSTNAME"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: snapshots-pvc
      imagePullSecrets:
        - name: evap-registry-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evap-celery-beat
  namespace: evap
  labels:
    app: evap
    component: celery-beat
    version: "4.0.0"
spec:
  replicas: 1                # Only ONE beat scheduler must run at a time
  selector:
    matchLabels:
      app: evap
      component: celery-beat
  strategy:
    type: Recreate            # Ensures no duplicate schedulers
  template:
    metadata:
      labels:
        app: evap
        component: celery-beat
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
      containers:
        - name: celery-beat
          image: evap-registry/evap-backend:4.0.0
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app
            - beat
            - --loglevel=info
            - --scheduler
            - django_celery_beat.schedulers:DatabaseScheduler
          envFrom:
            - configMapRef:
                name: evap-config
            - secretRef:
                name: evap-secrets
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
      imagePullSecrets:
        - name: evap-registry-secret
