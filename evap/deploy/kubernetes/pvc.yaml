apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshots-pvc
  namespace: evap
  labels:
    app: evap
    component: storage-snapshots
spec:
  accessModes:
    - ReadWriteMany      # Multiple backend/celery pods can write snapshots
  storageClassName: nfs-client   # Requires NFS provisioner (e.g., nfs-subdir-external-provisioner)
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: evap
  labels:
    app: evap
    component: storage-grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: evap
  labels:
    app: evap
    component: storage-redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 5Gi
