# ==============================================================================
# EVAP – Nginx Production Configuration
# ==============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # --- Performance ---
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  100;
    types_hash_max_size 2048;
    server_tokens       off;

    # --- Buffer sizes ---
    client_body_buffer_size     128k;
    client_max_body_size        50M;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    output_buffers              1 32k;
    postpone_output             1460;

    # --- Timeouts ---
    client_body_timeout    60s;
    client_header_timeout  60s;
    send_timeout           60s;
    proxy_connect_timeout  60s;
    proxy_read_timeout     120s;
    proxy_send_timeout     120s;

    # --- Gzip Compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # --- Rate Limiting Zones ---
    # General API: 100 req/s per IP
    limit_req_zone  $binary_remote_addr zone=api_limit:10m      rate=100r/s;
    # Auth endpoints: 10 req/min per IP  (anti-brute-force)
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m     rate=10r/m;
    # WebSocket connections: 20 per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn_limit:10m;

    # --- Upstream: FastAPI Backend ---
    upstream backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # --- Upstream: React Frontend ---
    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # --- Upstream: Grafana ---
    upstream grafana {
        server grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # --------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # --------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # HTTPS Main Server
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name evap.yourdomain.com;

        # --- SSL/TLS ---
        ssl_certificate         /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key     /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # --- Security Headers ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

        # --- Proxy headers common block ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # --- /api/ → FastAPI backend ---
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass         http://backend/api/;
            proxy_set_header   Connection "";

            # Disable buffering for streaming responses (SSE)
            proxy_buffering    off;
            proxy_cache        off;
        }

        # --- /api/v1/auth/ → rate-limited auth ---
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://backend/api/v1/auth/;
            proxy_set_header Connection "";
        }

        # --- /ws/ → WebSocket proxy ---
        location /ws/ {
            limit_conn ws_conn_limit 20;

            proxy_pass          http://backend/ws/;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_buffering     off;
        }

        # --- /docs, /redoc, /openapi.json → Swagger UI ---
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass       http://backend;
            proxy_set_header Connection "";
        }

        # --- /metrics → Prometheus metrics (restrict to internal) ---
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass       http://backend/metrics;
            proxy_set_header Connection "";
        }

        # --- /grafana/ → Grafana ---
        location /grafana/ {
            proxy_pass       http://grafana/;
            proxy_set_header Connection "";
        }

        # --- / → React frontend ---
        location / {
            proxy_pass         http://frontend/;
            proxy_set_header   Connection "";

            # Static asset caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass         http://frontend;
                proxy_cache_valid  200 7d;
                add_header         Cache-Control "public, max-age=604800, immutable";
                expires            7d;
            }
        }

        # --- Health check (internal) ---
        location /health {
            proxy_pass       http://backend/health;
            proxy_set_header Connection "";
            access_log       off;
        }

        # --- Static snapshots served directly ---
        location /snapshots/ {
            alias      /app/snapshots/;
            expires    1h;
            add_header Cache-Control "public";
            # Limit to authenticated users — handled at application level
        }

        # Block hidden files / dot-files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
